<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFlow — Votre Espace de Productivité et Concentration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- App Logic -->
    <script src="app.js" defer></script>
</head>
<body>
    <div class="background-decorations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="logo-area">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="url(#logo-grad)" stroke-width="2.5"/>
                    <path d="M12 7C9.23858 7 7 9.23858 7 12C7 14.7614 9.23858 17 12 17C14.7614 17 17 14.7614 17 12" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M12 10C10.8954 10 10 10.8954 10 12C10 13.1046 10.8954 14 12 14C13.1046 14 14 13.1046 14 12" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#a855f7"/>
                            <stop offset="1" stop-color="#06b6d4"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 id="app-title">ZenFlow</h1>
            </div>
            <p class="tagline">Trouvez votre rythme. Restez concentré.</p>
        </header>

        <!-- DASHBOARD GRID -->
        <main class="dashboard-grid">
            <!-- SECTION 1: POMODORO TIMER -->
            <section class="card pomodoro-card" id="pomodoro-section">
                <div class="card-header">
                    <h2>Concentration</h2>
                    <span class="badge" id="timer-status">Prêt</span>
                </div>
                
                <div class="timer-display-container">
                    <svg class="timer-svg" viewBox="0 0 200 200">
                        <circle class="timer-track" cx="100" cy="100" r="85" stroke-width="8"/>
                        <circle class="timer-progress" id="timer-progress-ring" cx="100" cy="100" r="85" stroke-width="8" stroke-dasharray="534" stroke-dashoffset="0" stroke-linecap="round"/>
                    </svg>
                    <div class="timer-text-overlay">
                        <span id="time-display">25:00</span>
                    </div>
                </div>

                <div class="timer-modes">
                    <button class="mode-btn active" id="mode-work" data-time="1500">Travail</button>
                    <button class="mode-btn" id="mode-short" data-time="300">Pause Courte</button>
                    <button class="mode-btn" id="mode-long" data-time="900">Pause Longue</button>
                </div>

                <div class="timer-controls">
                    <button class="control-btn primary" id="btn-start">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <span>Démarrer</span>
                    </button>
                    <button class="control-btn secondary" id="btn-pause" disabled>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <span>Pause</span>
                    </button>
                    <button class="control-btn secondary" id="btn-reset">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                </div>
            </section>

            <!-- SECTION 2: AMBIENT SOUNDS -->
            <section class="card ambient-card" id="ambient-section">
                <div class="card-header">
                    <h2>Sons d'Ambiance</h2>
                    <p class="subtitle">Améliorez votre focus</p>
                </div>
                
                <div class="ambient-controls">
                    <!-- Rain Sound -->
                    <div class="sound-control-row">
                        <button class="sound-toggle-btn" id="toggle-rain" data-sound="rain">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 13a4 4 0 0 1-8 0V6a4 4 0 0 1 8 0v7z"></path>
                                <path d="M8 19h8"></path>
                                <line x1="12" y1="19" x2="12" y2="22"></line>
                            </svg>
                            <span>Pluie apaisante</span>
                        </button>
                        <input type="range" class="volume-slider" id="volume-rain" min="0" max="1" step="0.05" value="0.5" disabled>
                    </div>

                    <!-- Ocean Waves -->
                    <div class="sound-control-row">
                        <button class="sound-toggle-btn" id="toggle-ocean" data-sound="ocean">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                            </svg>
                            <span>Vagues de l'océan</span>
                        </button>
                        <input type="range" class="volume-slider" id="volume-ocean" min="0" max="1" step="0.05" value="0.5" disabled>
                    </div>

                    <!-- White Noise -->
                    <div class="sound-control-row">
                        <button class="sound-toggle-btn" id="toggle-white" data-sound="white">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                            </svg>
                            <span>Bruit blanc</span>
                        </button>
                        <input type="range" class="volume-slider" id="volume-white" min="0" max="1" step="0.05" value="0.3" disabled>
                    </div>
                </div>
            </section>

            <!-- SECTION 3: ZEN DO (TASK LIST) -->
            <section class="card tasks-card" id="tasks-section">
                <div class="card-header">
                    <h2>ZenDo</h2>
                    <span class="badge" id="task-counter">0 / 0</span>
                </div>

                <form class="task-form" id="task-form">
                    <input type="text" id="task-input" placeholder="Ajouter une nouvelle tâche..." required maxlength="60">
                    <button type="submit" class="add-task-btn" id="btn-add-task">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </form>

                <div class="task-filters">
                    <button class="filter-btn active" data-filter="all">Toutes</button>
                    <button class="filter-btn" data-filter="active">Actives</button>
                    <button class="filter-btn" data-filter="completed">Faites</button>
                </div>

                <div class="tasks-list-container">
                    <ul class="tasks-list" id="tasks-list">
                        <!-- Tâches insérées en JS -->
                    </ul>
                </div>
            </section>

            <!-- SECTION 4: MOOD & HABIT LOGGER -->
            <section class="card mood-card" id="mood-section">
                <div class="card-header">
                    <h2>Suivi du Bien-être</h2>
                    <p class="subtitle">Comment vous sentez-vous aujourd'hui ?</p>
                </div>

                <div class="mood-selector">
                    <button class="mood-btn" data-mood="5" title="Excellent">
                        <span class="emoji">✨</span>
                        <span class="mood-label">Génial</span>
                    </button>
                    <button class="mood-btn" data-mood="4" title="Bien">
                        <span class="emoji">😊</span>
                        <span class="mood-label">Bien</span>
                    </button>
                    <button class="mood-btn" data-mood="3" title="Neutre">
                        <span class="emoji">😐</span>
                        <span class="mood-label">Neutre</span>
                    </button>
                    <button class="mood-btn" data-mood="2" title="Fatigué">
                        <span class="emoji">🥱</span>
                        <span class="mood-label">Fatigué</span>
                    </button>
                    <button class="mood-btn" data-mood="1" title="Stressé">
                        <span class="emoji">😰</span>
                        <span class="mood-label">Stressé</span>
                    </button>
                </div>

                <div class="chart-container">
                    <h3 class="chart-title">Historique d'Humeur (7 derniers jours)</h3>
                    <div class="chart-svg-wrapper">
                        <svg class="mood-chart" id="mood-chart-svg" viewBox="0 0 500 180">
                            <!-- Graphique dessiné dynamiquement en JS -->
                            <g class="grid-lines"></g>
                            <path class="chart-line" d="" fill="none" stroke="url(#chart-grad)" stroke-width="4" stroke-linecap="round"/>
                            <path class="chart-area" d="" fill="url(#chart-area-grad)"/>
                            <g class="chart-points"></g>
                            <g class="chart-labels"></g>
                            <defs>
                                <linearGradient id="chart-grad" x1="0" y1="0" x2="1" y2="0">
                                    <stop offset="0%" stop-color="#06b6d4" />
                                    <stop offset="100%" stop-color="#a855f7" />
                                </linearGradient>
                                <linearGradient id="chart-area-grad" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3" />
                                    <stop offset="100%" stop-color="#a855f7" stop-opacity="0.0" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>
            </section>
        </main>

        <!-- FOOTER -->
        <footer class="app-footer">
            <p>ZenFlow Dashboard — Développé pour votre équilibre quotidien.</p>
        </footer>
    </div>
</body>
</html>
